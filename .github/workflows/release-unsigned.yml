name: Release (unsigned)

# Signing-free release path for use until Azure Trusted Signing is fully set up. The unsigned-v* tag prefix keeps these tags from also triggering the signed Release workflow (which matches v*).
on:
  push:
    tags:
      - "unsigned-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish single-file exe
        run: dotnet publish TabDesktop -c Release -o dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} dist/TabDesktop.exe --title "TabDesktop ${{ github.ref_name }}" --generate-notes
